<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Akun</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f6f1ff;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            max-width: 620px;
            margin: 24px auto;
            background: #ffffff;
            border: 1px solid #e9d5ff;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: #7c3aed;
            color: #ffffff;
            padding: 24px;
            font-size: 22px;
            font-weight: 700;
        }

        .content {
            padding: 24px;
            line-height: 1.6;
            font-size: 15px;
        }

        .button {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 16px;
            border-radius: 8px;
            background: #7c3aed;
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .button-wrapper {
            margin: 16px 0;
        }

        .note {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            background: #f3e8ff;
            color: #5b21b6;
            font-size: 14px;
        }

        .link-text {
            margin-top: 10px;
            word-break: break-all;
            font-size: 13px;
            color: #5b21b6;
        }

        .footer {
            padding: 16px 24px 24px;
            color: #6b7280;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Verifikasi Akun</div>
        <div class="content">
            <p>Halo {{ .Email }},</p>

            <p>
                Aktifkan akun RPLibrary kamu dengan menekan tombol verifikasi di bawah ini.
            </p>

            <div class="button-wrapper">
                <a href="{{ .Verify }}" class="button">Verifikasi Akun</a>
            </div>

            <div class="note">
                Jika tombol tidak berfungsi, salin tautan berikut ke browser kamu.
                <div class="link-text">{{ .Verify }}</div>
            </div>
        </div>

        <div class="footer">
            Email ini dikirim otomatis oleh sistem RPLibrary.
        </div>
    </div>
</body>

</html>
