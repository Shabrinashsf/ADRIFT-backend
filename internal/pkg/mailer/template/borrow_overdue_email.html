<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengembalian Buku Terlambat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .container {
            max-width: 620px;
            margin: 24px auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: #b91c1c;
            color: #ffffff;
            padding: 22px;
            font-size: 22px;
            font-weight: 700;
        }

        .content {
            padding: 24px;
            line-height: 1.6;
            font-size: 15px;
        }

        .book-title {
            font-weight: 700;
        }

        .alert {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 14px;
        }

        .footer {
            padding: 14px 24px 24px;
            color: #6b7280;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Peminjaman Melewati Tenggat</div>
        <div class="content">
            <p>Halo {{ .Email }},</p>
            <p>
                Masa peminjaman buku <span class="book-title">{{ .BookTitle }}</span> sudah melewati due date.
            </p>
            <div class="alert">
                Harap mengembalikkan buku ke lab karena sudah lewat masa tenggat.
            </div>
        </div>
        <div class="footer">
            Email ini dikirim otomatis oleh sistem RPLibrary.
        </div>
    </div>
</body>

</html>
